<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>运营控制台 · 单主机游戏推广</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  .badge-pending   { background:#fef3c7;color:#92400e; }
  .badge-approved  { background:#d1fae5;color:#065f46; }
  .badge-rejected  { background:#fee2e2;color:#991b1b; }
  textarea,input[type=text],input[type=url],input[type=password],select {
    border:1.5px solid #e5e7eb;border-radius:10px;padding:9px 13px;width:100%;outline:none;transition:border .2s;font-size:14px;
  }
  input:focus,select:focus,textarea:focus { border-color:#e63e6d; }
  .btn-primary   { background:#e63e6d;color:white;border-radius:9px;padding:9px 20px;font-weight:600;cursor:pointer;transition:background .2s;border:none; }
  .btn-primary:hover { background:#c52d5a; }
  .btn-secondary { background:#f3f4f6;color:#374151;border-radius:9px;padding:9px 20px;font-weight:600;cursor:pointer;border:none; }
  .btn-secondary:hover { background:#e5e7eb; }
  .btn-green  { background:#10b981;color:white;border-radius:7px;padding:5px 14px;font-size:13px;cursor:pointer;border:none; }
  .btn-red    { background:#ef4444;color:white;border-radius:7px;padding:5px 14px;font-size:13px;cursor:pointer;border:none; }
  .section-tab { padding:7px 18px;border-radius:99px;cursor:pointer;font-size:14px;transition:all .15s;border:none;background:transparent; }
  .section-tab.active { background:#e63e6d;color:white; }
  .modal-backdrop { background:rgba(0,0,0,.45); }
  ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-thumb { background:#d1d5db;border-radius:3px; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<div class="bg-white shadow-sm sticky top-0 z-40">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="index.html" class="text-gray-400 hover:text-gray-700 text-sm">← 返回</a>
      <div class="w-px h-4 bg-gray-200"></div>
      <span class="text-xl">📊</span>
      <span class="font-bold text-gray-800">运营控制台</span>
    </div>
    <button class="btn-primary text-sm py-2 px-4" onclick="exportReport()">📋 导出汇总报告</button>
  </div>
</div>

<!-- Stats -->
<div class="max-w-5xl mx-auto px-4 mt-5">
  <div id="statsGrid" class="grid grid-cols-4 gap-4 mb-5"></div>
</div>

<!-- Tabs -->
<div class="bg-white border-b border-gray-100 sticky top-[52px] z-30">
  <div class="max-w-5xl mx-auto px-4 py-2 flex gap-1">
    <button onclick="showTab('pending')" id="tab-pending" class="section-tab active">⏳ 待确认</button>
    <button onclick="showTab('board')"   id="tab-board"   class="section-tab">📋 全局看板</button>
  </div>
</div>

<div class="max-w-5xl mx-auto px-4 py-6">

  <!-- Pending -->
  <div id="pane-pending">
    <div id="pendingList" class="space-y-3"></div>
  </div>

  <!-- Board -->
  <div id="pane-board" class="hidden">
    <div id="boardList" class="space-y-5"></div>
  </div>

</div>

<!-- Toast -->
<div id="toast" class="fixed top-4 right-4 text-white px-5 py-3 rounded-xl text-sm shadow-xl z-[9999] opacity-0 transition-opacity duration-300 pointer-events-none" style="background:#1f2937"></div>

<!-- Password Modal -->
<div id="pwdModal" class="fixed inset-0 modal-backdrop flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-8 w-96 shadow-xl">
    <div class="text-2xl mb-2">🔐</div>
    <h3 class="text-xl font-bold text-gray-800 mb-1">运营控制台</h3>
    <p class="text-gray-400 text-sm mb-5">请输入访问密码（默认：xhs2024）</p>
    <input type="password" id="pwdInput" placeholder="请输入密码" class="mb-5" />
    <div class="flex gap-3">
      <button class="btn-secondary flex-1" onclick="window.location.href='index.html'">取消</button>
      <button class="btn-primary flex-1" onclick="verifyPwd()">确认进入</button>
    </div>
  </div>
</div>

<script>
const DB_KEY = 'xhs_game_promo_v2';
const MAKER_PWD = 'xhs2024';

function loadDB() {
  try {
    const d = JSON.parse(localStorage.getItem(DB_KEY)) || {};
    return {
      tasks: d.tasks || [],
      signups: d.signups || [],
      contents: d.contents || [],
      cdkPools: d.cdkPools || {},
      pendingActions: d.pendingActions || []
    };
  } catch(e) { return { tasks:[], signups:[], contents:[], cdkPools:{}, pendingActions:[] }; }
}
function saveDB(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type==='success'?'#059669':type==='error'?'#dc2626':'#1f2937';
  t.style.opacity = '1';
  setTimeout(()=>{ t.style.opacity='0'; }, 2800);
}

function verifyPwd() {
  if (document.getElementById('pwdInput').value.trim() === MAKER_PWD) {
    document.getElementById('pwdModal').classList.add('hidden');
    sessionStorage.setItem('op_unlocked', '1');
    initPage();
  } else {
    showToast('密码错误', 'error');
  }
}
document.getElementById('pwdInput').addEventListener('keydown', e => { if(e.key==='Enter') verifyPwd(); });

// Auto-unlock if session already verified
if (sessionStorage.getItem('op_unlocked') === '1') {
  document.getElementById('pwdModal').classList.add('hidden');
  initPage();
}

function initPage() {
  renderStats();
  renderPending();
  showTab('pending');
}

function showTab(tab) {
  ['pending','board'].forEach(t => {
    document.getElementById('pane-'+t).classList.add('hidden');
    document.getElementById('tab-'+t).classList.remove('active');
  });
  document.getElementById('pane-'+tab).classList.remove('hidden');
  document.getElementById('tab-'+tab).classList.add('active');
  if (tab === 'board') renderBoard();
}

// ---- STATS ----
function renderStats() {
  const db = loadDB();
  const total    = db.tasks.filter(t=>t.opStatus==='approved').length;
  const signups  = db.signups.length;
  const approved = db.signups.filter(s=>s.opStatus==='approved' && s.makerStatus==='approved').length;
  const contents = db.contents.length;
  document.getElementById('statsGrid').innerHTML = [
    {label:'已发布任务', value:total, color:'text-purple-600', bg:'from-purple-50 to-purple-100'},
    {label:'总报名', value:signups, color:'text-blue-600', bg:'from-blue-50 to-blue-100'},
    {label:'已通过审核', value:approved, color:'text-green-600', bg:'from-green-50 to-green-100'},
    {label:'已交稿', value:contents, color:'text-pink-600', bg:'from-pink-50 to-pink-100'},
  ].map(s=>`<div class="bg-gradient-to-br ${s.bg} rounded-2xl p-4 text-center border border-white shadow-sm">
    <div class="text-3xl font-bold ${s.color}">${s.value}</div>
    <div class="text-xs text-gray-500 mt-1">${s.label}</div>
  </div>`).join('');
}

// ---- PENDING ACTIONS ----
function renderPending() {
  const db = loadDB();
  const pending = db.pendingActions.filter(a=>a.opStatus==='pending').sort((a,b)=>b.createdAt-a.createdAt);
  const el = document.getElementById('pendingList');
  if (!pending.length) {
    el.innerHTML = `<div class="text-center text-gray-400 py-16"><div class="text-4xl mb-3">✅</div><p>没有待确认事项</p></div>`;
    return;
  }
  el.innerHTML = pending.map(a => {
    const task = db.tasks.find(t=>t.id===a.taskId);
    const gameName = task?.gameName || a.payload?.gameName || '未知游戏';
    let typeBadge = '', summary = '';

    if (a.type === 'task_publish') {
      typeBadge = '<span class="text-xs font-bold px-3 py-1 rounded-full" style="background:#ede9fe;color:#5b21b6;">新任务</span>';
      summary = `制作人发布了新任务「${gameName}」`;
    } else if (a.type === 'new_signup') {
      const name = a.payload?.creatorName || '未知';
      const type = a.payload?.creatorType || '';
      const fans = a.payload?.creatorFans ? ` · 粉丝 ${a.payload.creatorFans}` : '';
      typeBadge = '<span class="text-xs font-bold px-3 py-1 rounded-full" style="background:#fef3c7;color:#92400e;">新报名</span>';
      summary = `「${name}」（${type}${fans}）报名了「${gameName}」，待确认后制作人可审核`;
    } else if (a.type === 'signup_review') {
      const signup = db.signups.find(s=>s.id===a.payload?.signupId);
      const name = signup?.creatorName || '未知';
      const type = signup?.creatorType || '';
      const dec = a.payload?.decision === 'approved' ? '通过' : '拒绝';
      typeBadge = '<span class="text-xs font-bold px-3 py-1 rounded-full" style="background:#dbeafe;color:#1e40af;">报名审核</span>';
      summary = `「${name}」（${type}）报名「${gameName}」→ 制作人${dec}，待运营确认`;
    } else if (a.type === 'cdk_assign') {
      const n = a.payload?.allocations?.length || 0;
      typeBadge = '<span class="text-xs font-bold px-3 py-1 rounded-full" style="background:#d1fae5;color:#065f46;">CDK分配</span>';
      summary = `为「${gameName}」${n}位种草官分配CDK，待确认后种草官可见`;
    }

    return `<div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
      <div class="flex items-start justify-between gap-4">
        <div class="flex-1">
          <div class="flex items-center gap-2 mb-2">${typeBadge}</div>
          <p class="text-sm font-medium text-gray-800 mb-1">${summary}</p>
          <p class="text-xs text-gray-400">${new Date(a.createdAt).toLocaleString('zh-CN')}</p>
        </div>
        <div class="flex gap-2 flex-shrink-0">
          <button class="btn-green" onclick="confirmAction('${a.id}')">确认生效</button>
          <button class="btn-red"   onclick="rejectAction('${a.id}')">拒绝</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function confirmAction(actionId) {
  const db = loadDB();
  const a = db.pendingActions.find(x=>x.id===actionId);
  if (!a) return;

  if (a.type === 'task_publish') {
    const task = db.tasks.find(t=>t.id===a.taskId);
    if (task) task.opStatus = 'approved';
    a.opStatus = 'approved';
  } else if (a.type === 'new_signup') {
    // 确认后：报名对制作人可见（opStatus=approved），制作人可以开始审核
    const signup = db.signups.find(s=>s.id===a.payload?.signupId);
    if (signup) signup.opStatus = 'approved';
    a.opStatus = 'approved';
  } else if (a.type === 'signup_review') {
    const signup = db.signups.find(s=>s.id===a.payload?.signupId);
    if (signup) {
      // 运营确认制作人的审核决定，种草官可见最终结果
      signup.opStatus = 'approved';
      if (a.payload?.decision === 'rejected') signup.status = 'rejected';
      else signup.status = 'approved';
    }
    a.opStatus = 'approved';
  } else if (a.type === 'cdk_assign') {
    const allocs = a.payload?.allocations || [];
    allocs.forEach(alloc => {
      const signup = db.signups.find(s=>s.id===alloc.signupId);
      if (signup) signup.cdkKeys = alloc.cdkKeys;
    });
    a.opStatus = 'approved';
  }

  saveDB(db);
  showToast('已确认生效 ✅', 'success');
  renderStats();
  renderPending();
}

function rejectAction(actionId) {
  const db = loadDB();
  const a = db.pendingActions.find(x=>x.id===actionId);
  if (!a) return;

  if (a.type === 'task_publish') {
    const task = db.tasks.find(t=>t.id===a.taskId);
    if (task) task.opStatus = 'rejected';
    a.opStatus = 'rejected';
  } else if (a.type === 'new_signup') {
    // 拒绝：报名对制作人不可见，种草官看到"审核中"（实际已被退回）
    const signup = db.signups.find(s=>s.id===a.payload?.signupId);
    if (signup) { signup.opStatus = 'rejected'; signup.status = 'rejected'; }
    a.opStatus = 'rejected';
  } else if (a.type === 'signup_review') {
    // 拒绝：回滚制作人的审核决定，signup回到待审状态
    const signup = db.signups.find(s=>s.id===a.payload?.signupId);
    if (signup) {
      signup.makerStatus = 'pending';
      signup.opStatus = 'approved'; // 报名本身仍对制作人可见，但审核决定被退回
    }
    a.opStatus = 'rejected';
  } else if (a.type === 'cdk_assign') {
    // 拒绝：不写入cdkKeys，制作人需重新提交
    a.opStatus = 'rejected';
  }

  saveDB(db);
  showToast('已拒绝', 'info');
  renderStats();
  renderPending();
}

// ---- BOARD ----
function renderBoard() {
  const db = loadDB();
  const el = document.getElementById('boardList');
  if (!db.tasks.length) { el.innerHTML = `<div class="text-center text-gray-400 py-10">暂无数据</div>`; return; }

  const opStatusLabel = {pending:'待确认', approved:'已发布', rejected:'已拒绝'};
  const opStatusColor = {pending:'bg-amber-100 text-amber-800', approved:'bg-green-100 text-green-700', rejected:'bg-red-100 text-red-700'};

  el.innerHTML = db.tasks.map(t => {
    const tSignups  = db.signups.filter(s=>s.taskId===t.id);
    const tApproved = tSignups.filter(s=>s.makerStatus==='approved' && s.opStatus==='approved');
    const tContents = db.contents.filter(c=>c.taskId===t.id);

    const rows = tSignups.map(s => {
      const c = tContents.find(x=>x.creatorName===s.creatorName);
      const makerBadge = s.makerStatus === 'approved' ? '✅ 通过' : s.makerStatus === 'rejected' ? '❌ 拒绝' : '⏳ 待审';
      const opBadge = s.opStatus === 'approved' ? '✅ 确认' : s.opStatus === 'rejected' ? '❌ 拒绝' : '⏳ 待确认';
      return `<tr class="border-b border-gray-50 hover:bg-gray-50">
        <td class="py-2 font-medium px-2 text-sm">${s.creatorName}</td>
        <td class="py-2 px-2"><span class="text-xs px-2 py-0.5 rounded-full font-semibold ${s.creatorType==='主播'?'bg-purple-100 text-purple-700':'bg-blue-100 text-blue-700'}">${s.creatorType}</span></td>
        <td class="py-2 px-2 text-sm text-gray-700">${s.creatorFans||'-'}</td>
        <td class="py-2 px-2">${s.creatorProfile?`<a href="${s.creatorProfile}" target="_blank" class="text-blue-500 text-xs hover:underline">查看 ↗</a>`:'-'}</td>
        <td class="py-2 px-2 text-xs">${makerBadge}</td>
        <td class="py-2 px-2 text-xs">${opBadge}</td>
        <td class="py-2 px-2 text-xs">${s.cdkKeys&&s.cdkKeys.length?'✅ 已分配':'-'}</td>
        <td class="py-2 px-2">${c?`<span class="text-xs text-blue-600">✅ 已提交</span>`:`<span class="text-xs text-gray-400">未提交</span>`}</td>
      </tr>`;
    }).join('');

    return `<div class="bg-white rounded-2xl shadow-sm p-5">
      <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <div class="flex items-center gap-2 mb-1">
            <h3 class="font-bold text-gray-800 text-lg">${t.gameName}</h3>
            <span class="text-xs px-2 py-0.5 rounded-full font-semibold ${opStatusColor[t.opStatus]||'bg-gray-100 text-gray-700'}">${opStatusLabel[t.opStatus]||t.opStatus}</span>
          </div>
          <p class="text-sm text-pink-600">✨ ${t.highlight}</p>
        </div>
        <div class="flex gap-4 text-center">
          <div><div class="text-xl font-bold text-gray-700">${tSignups.length}</div><div class="text-xs text-gray-400">报名</div></div>
          <div><div class="text-xl font-bold text-green-600">${tApproved.length}</div><div class="text-xs text-gray-400">通过</div></div>
          <div><div class="text-xl font-bold text-blue-600">${tContents.length}</div><div class="text-xs text-gray-400">交稿</div></div>
        </div>
      </div>
      ${tSignups.length > 0 ? `
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr class="border-b border-gray-100">
              <th class="text-left py-2 text-gray-400 font-medium px-2 text-xs">昵称</th>
              <th class="text-left py-2 text-gray-400 font-medium px-2 text-xs">类型</th>
              <th class="text-left py-2 text-gray-400 font-medium px-2 text-xs">粉丝数</th>
              <th class="text-left py-2 text-gray-400 font-medium px-2 text-xs">主页</th>
              <th class="text-left py-2 text-gray-400 font-medium px-2 text-xs">制作人审核</th>
              <th class="text-left py-2 text-gray-400 font-medium px-2 text-xs">运营确认</th>
              <th class="text-left py-2 text-gray-400 font-medium px-2 text-xs">CDK</th>
              <th class="text-left py-2 text-gray-400 font-medium px-2 text-xs">内容</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>` : '<div class="text-sm text-gray-400">暂无报名</div>'}
    </div>`;
  }).join('');
}

// ---- EXPORT ----
function exportReport() {
  const db = loadDB();
  let r = `📊 小红书单主机游戏推广平台 · 汇总报告\n生成时间：${new Date().toLocaleString('zh-CN')}\n${'='.repeat(52)}\n\n`;
  db.tasks.forEach((t,i) => {
    const tSignups  = db.signups.filter(s=>s.taskId===t.id);
    const tApproved = tSignups.filter(s=>s.makerStatus==='approved' && s.opStatus==='approved');
    const tContents = db.contents.filter(c=>c.taskId===t.id);
    r += `【任务${i+1}】${t.gameName} · ${t.opStatus==='approved'?'已发布':t.opStatus==='rejected'?'已拒绝':'待确认'}\n`;
    r += `亮点：${t.highlight}\n`;
    if (t.gameLink) r += `游戏链接：${t.gameLink}\n`;
    r += `上线：${t.launchDate||'-'} | 内容释出：${t.releaseTime||'-'} | 报名截止：${t.deadline||'-'}\n`;
    r += `招募：${t.recruitType} | 报名 ${tSignups.length} 人 | 通过 ${tApproved.length} 人 | 已交稿 ${tContents.length} 人\n\n`;
    tApproved.forEach(s => {
      const c = tContents.find(x=>x.creatorName===s.creatorName);
      r += `  · ${s.creatorName}（${s.creatorType}） | 粉丝：${s.creatorFans||'-'}\n`;
      if (s.creatorProfile) r += `    主页：${s.creatorProfile}\n`;
      if (s.cdkKeys&&s.cdkKeys.length) r += `    CDK：${s.cdkKeys.join(' / ')}\n`;
      if (c) {
        if (c.creatorType==='主播') {
          if (c.clip) r += `    直播切片：${c.clip}\n`;
        } else {
          if (c.video) r += `    种草视频：${c.video}\n`;
        }
      } else { r += `    ⏳ 尚未提交内容\n`; }
      r += '\n';
    });
    r += '-'.repeat(40) + '\n\n';
  });
  navigator.clipboard.writeText(r).then(()=>showToast('报告已复制到剪贴板 📋','success')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=r;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    showToast('报告已复制到剪贴板 📋','success');
  });
}
</script>
</body>
</html>
