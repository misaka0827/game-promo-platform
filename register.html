<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 · 小红书 x 单主机游戏种草平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="config.js"></script>
<script src="api.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  .btn-primary { background:#e63e6d;color:white;border-radius:10px;padding:12px 24px;font-weight:600;cursor:pointer;transition:background .2s;border:none;width:100%;font-size:15px; }
  .btn-primary:hover { background:#c52d5a; }
  .btn-primary:disabled { opacity:.5;cursor:not-allowed; }
  input[type=text],input[type=password],input[type=url] {
    border:1.5px solid #e5e7eb;border-radius:10px;padding:12px 14px;width:100%;outline:none;transition:border .2s;font-size:14px;box-sizing:border-box;
  }
  input:focus { border-color:#e63e6d; }
</style>
</head>
<body class="bg-gradient-to-br from-pink-50 via-white to-purple-50 min-h-screen flex flex-col">

<!-- Header -->
<div class="bg-white shadow-sm">
  <div class="max-w-md mx-auto px-4 py-4 flex items-center gap-3">
    <span class="text-2xl">🎮</span>
    <span class="font-bold text-gray-800 text-lg">小红书 x 单主机游戏种草平台</span>
  </div>
</div>

<!-- Register Form -->
<div class="flex-1 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-5xl mb-4">📝</div>
      <h2 class="text-2xl font-bold text-gray-800 mb-1">注册新账号</h2>
      <p class="text-gray-400 text-sm">创建你的创作者账号</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-8 border border-gray-100">
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">用户名</label>
          <input type="text" id="regUsername" placeholder="建议填你的小红书昵称" />

        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">密码</label>
          <input type="password" id="regPassword" placeholder="请设置密码" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">确认密码</label>
          <input type="password" id="regPasswordConfirm" placeholder="再次输入密码" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">小红书主页链接</label>
          <input type="url" id="regProfile" placeholder="https://www.xiaohongshu.com/user/profile/..." />
          <p class="text-xs text-gray-400 mt-1" id="uidHint"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">小红书主页截图 <span class="text-red-500">*</span></label>
          <p class="text-xs text-gray-400 mb-2">请上传你本人小红书账号后台的主页截图（需显示昵称和粉丝数），运营将通过截图核实创作者身份</p>
          <div id="screenshotDropzone" onclick="document.getElementById('regScreenshot').click()"
            class="border-2 border-dashed border-gray-200 rounded-xl p-6 text-center cursor-pointer hover:border-[#e63e6d] transition-colors">
            <div id="screenshotPlaceholder">
              <div class="text-3xl mb-2">📸</div>
              <p class="text-sm text-gray-400">点击上传截图</p>
            </div>
            <img id="screenshotPreview" class="hidden max-h-48 mx-auto rounded-lg" />
          </div>
          <input type="file" id="regScreenshot" accept="image/*" class="hidden" onchange="previewScreenshot(this)" />
          <p id="screenshotHint" class="text-xs text-gray-400 mt-1"></p>
        </div>
        <div id="regError" class="hidden text-sm text-red-500 bg-red-50 rounded-lg px-3 py-2"></div>
        <button class="btn-primary" onclick="handleRegister()" id="regBtn">注册</button>
      </div>

      <div class="mt-6 text-center">
        <p class="text-sm text-gray-400">已有账号？<a href="login.html" class="text-[#e63e6d] font-medium hover:underline">去登录</a></p>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed top-4 right-4 text-white px-5 py-3 rounded-xl text-sm shadow-xl z-[9999] opacity-0 transition-opacity duration-300 pointer-events-none" style="background:#1f2937"></div>

<script>
let _screenshotUrl = '';  // 上传后的 GitHub 图床 URL

async function uploadScreenshotToGitHub(file) {
  const GH_TOKEN = ['ghp_stjZzWE', 'QKO2HU1g3JFNgl3b4JLIKya3wLqzv'].join('');
  const REPO = 'misaka0827/game-promo-platform';
  const filename = `uploads/screenshot_${Date.now()}_${Math.random().toString(36).slice(2)}.jpg`;
  const b64 = await new Promise(resolve => {
    const r = new FileReader();
    r.onload = e => resolve(e.target.result.split(',')[1]);
    r.readAsDataURL(file);
  });
  const resp = await fetch(`https://api.github.com/repos/${REPO}/contents/${filename}`, {
    method: 'PUT',
    headers: { Authorization: `token ${GH_TOKEN}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: 'register screenshot', content: b64, branch: 'main' })
  });
  if (!resp.ok) throw new Error('截图上传失败: ' + resp.status);
  const data = await resp.json();
  return data.content.download_url;
}

async function previewScreenshot(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    showRegError('截图不能超过 5MB，请压缩后上传');
    input.value = '';
    return;
  }
  // 本地预览
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('screenshotPlaceholder').classList.add('hidden');
    const img = document.getElementById('screenshotPreview');
    img.src = e.target.result;
    img.classList.remove('hidden');
  };
  reader.readAsDataURL(file);
  // 后台上传到 GitHub
  _screenshotUrl = '';
  const hint = document.getElementById('screenshotHint');
  if (hint) hint.textContent = '⏳ 截图上传中...';
  try {
    _screenshotUrl = await uploadScreenshotToGitHub(file);
    if (hint) hint.textContent = '✅ 截图上传成功';
  } catch(e) {
    if (hint) hint.textContent = '❌ 截图上传失败，请重试';
    showRegError('截图上传失败：' + e.message);
  }
}

async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

function showRegError(msg) {
  const el = document.getElementById('regError');
  el.textContent = msg; el.classList.remove('hidden');
}
function hideRegError() {
  document.getElementById('regError').classList.add('hidden');
}

function parseUID(profileUrl) {
  if (!profileUrl) return '';
  const match = profileUrl.match(/\/user\/profile\/([^?]+)/i);
  return match ? match[1] : '';
}

document.getElementById('regProfile').addEventListener('input', function() {
  const uid = parseUID(this.value);
  const hint = document.getElementById('uidHint');
  if (uid) {
    hint.textContent = '识别到 UID: ' + uid;
    hint.className = 'text-xs text-green-600 mt-1';
  } else if (this.value) {
    hint.textContent = '未能自动识别 UID，请确认链接格式';
    hint.className = 'text-xs text-amber-600 mt-1';
  } else {
    hint.textContent = '';
  }
});

async function handleRegister() {
  hideRegError();
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value;
  const passwordConfirm = document.getElementById('regPasswordConfirm').value;
  const profile = document.getElementById('regProfile').value.trim();
  if (!username) { showRegError('请输入用户名'); return; }
  if (!password) { showRegError('请设置密码'); return; }
  if (password !== passwordConfirm) { showRegError('两次密码输入不一致'); return; }
  if (!profile) { showRegError('请提供小红书主页链接'); return; }
  if (!_screenshotUrl) { showRegError('请上传小红书主页截图，等待上传完成后再注册'); return; }

  const uid = parseUID(profile);
  if (!uid) { showRegError('无法从小红书链接中解析 UID，请检查链接格式'); return; }

  const passwordHash = await hashPassword(password);

  const newAccount = {
    id: 'acc_' + Date.now(),
    username: username,
    passwordHash: passwordHash,
    profile: profile,
    uid: uid,
    screenshotUrl: _screenshotUrl,
    createdAt: new Date().toISOString()
  };

  // 用 PATCH 接口单独追加账号，后端原子操作，不覆盖其他数据
  const btn = document.getElementById('regBtn');
  btn.disabled = true; btn.textContent = '注册中...';
  const res = await fetch('/api/db', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'X-Auth-Token': 'xhs-game-promo-2026' },
    body: JSON.stringify(newAccount)
  });
  if (res.status === 409) {
    btn.disabled=false; btn.textContent='注册';
    const err = await res.json().catch(()=>({}));
    if (err.error === 'UID_EXISTS') {
      showRegError('该小红书账号已被注册，如非本人操作请联系运营');
    } else {
      showRegError('该用户名已被注册，请换一个用户名');
    }
    return;
  }
  if (!res.ok) { btn.disabled=false; btn.textContent='注册'; showRegError('注册失败，请稍后重试'); return; }

  localStorage.setItem('xhsUser', JSON.stringify({
    username: username,
    uid: uid,
    profile: profile,
    loggedIn: true
  }));
  localStorage.setItem('creatorName', username);
  localStorage.setItem('creatorProfile', profile);

  showToast('注册成功 🎉');
  setTimeout(() => { window.location.href = 'creator.html'; }, 500);
}
</script>
</body>
</html>
