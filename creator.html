<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书 x 单主机游戏种草平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="config.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  .card-hover { transition: all .2s; }
  .card-hover:hover { box-shadow: 0 8px 32px rgba(230,62,109,.15); transform: translateY(-3px); }
  .identity-card { border:2px solid #f0f0f0;border-radius:20px;padding:32px 28px;cursor:pointer;transition:all .2s;background:white; }
  .identity-card:hover { border-color:#e63e6d; }
  .btn-primary { background:#e63e6d;color:white;border-radius:10px;padding:10px 24px;font-weight:600;cursor:pointer;transition:background .2s;border:none;width:100%; }
  .btn-primary:hover { background:#c52d5a; }
  .btn-secondary { background:#f3f4f6;color:#374151;border-radius:10px;padding:10px 24px;font-weight:600;cursor:pointer;border:none;width:100%; }
  .btn-secondary:hover { background:#e5e7eb; }
  input[type=text],input[type=url] {
    border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 14px;width:100%;outline:none;transition:border .2s;font-size:14px;box-sizing:border-box;
  }
  input:focus { border-color:#e63e6d; }
  .modal-backdrop { background:rgba(0,0,0,.5); }
</style>
</head>
<body class="bg-gradient-to-br from-pink-50 via-white to-purple-50 min-h-screen">

<!-- Header -->
<div class="bg-white shadow-sm">
  <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="index.html" class="text-gray-400 hover:text-gray-700 text-sm">← 返回</a>
      <span class="text-2xl">🎮</span>
      <div>
        <div class="font-bold text-gray-800" id="creatorHeaderName"></div>
        <div class="text-xs text-gray-400" id="creatorHeaderSlogan"></div>
      </div>
    </div>
    <div class="flex items-center gap-2" id="userBar">
      <span class="text-xs text-gray-500">已登录：<span id="headerUsername" class="font-semibold text-gray-700"></span></span>
      <button class="text-xs text-gray-400 hover:text-red-500 transition-colors" onclick="handleLogout()">退出</button>
    </div>
  </div>
</div>

<!-- Main -->
<div class="max-w-xl mx-auto mt-10 px-4 pb-16">

  <div class="text-center mb-8">
    <div class="text-5xl mb-3">🕹️</div>
    <h2 class="text-2xl font-bold text-gray-800 mb-1" id="creatorHeroTitle"></h2>
    <p class="text-gray-400 text-sm" id="creatorHeroSubtitle"></p>
  </div>

  <!-- 步骤说明 -->
  <div class="bg-white rounded-2xl shadow-sm p-5 mb-6 border border-gray-100">
    <p class="text-xs font-semibold text-gray-400 mb-3 uppercase tracking-wide">任务流程</p>
    <div class="flex items-start gap-3" id="workflowStepsContainer"></div>
  </div>

  <!-- 身份选择 -->
  <div class="grid grid-cols-2 gap-4">
    <div class="identity-card card-hover" onclick="choose('streamer')">
      <div class="text-4xl mb-3" id="crIdCardAIcon"></div>
      <div class="font-bold text-gray-800 text-lg mb-1" id="crIdCardALabel"></div>
      <div class="text-sm text-gray-500" id="crIdCardADesc"></div>
      <div class="mt-4 text-xs font-semibold" id="crIdCardASub"></div>
    </div>
    <div class="identity-card card-hover" onclick="choose('blogger')">
      <div class="text-4xl mb-3" id="crIdCardBIcon"></div>
      <div class="font-bold text-gray-800 text-lg mb-1" id="crIdCardBLabel"></div>
      <div class="text-sm text-gray-500" id="crIdCardBDesc"></div>
      <div class="mt-4 text-xs font-semibold" id="crIdCardBSub"></div>
    </div>
  </div>

  <!-- 已登录快捷入口 -->
  <div id="quickEntry" class="hidden mt-6">
    <div class="bg-white rounded-2xl shadow-sm p-4 border border-gray-100 flex items-center justify-between">
      <div>
        <p class="text-xs text-gray-400 mb-0.5">上次以「<span id="qeName" class="font-semibold text-gray-600"></span>」身份登录</p>
        <p class="text-xs text-gray-400">点击右侧直接进入，或重新选择上方身份</p>
      </div>
      <button id="qeBtn" class="flex-shrink-0 ml-4 bg-gray-800 text-white text-xs font-semibold px-4 py-2 rounded-xl hover:bg-gray-700 transition-colors" onclick="quickGo()">继续进入</button>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast" class="fixed top-4 right-4 text-white px-5 py-3 rounded-xl text-sm shadow-xl z-[9999] opacity-0 transition-opacity duration-300 pointer-events-none" style="background:#1f2937"></div>

<!-- Streamer Modal -->
<div id="streamerModal" class="fixed inset-0 modal-backdrop flex items-center justify-center z-50 hidden">
  <div class="bg-white rounded-2xl p-8 w-[420px] shadow-2xl mx-4">
    <div class="text-2xl mb-2" id="crStModalIcon"></div>
    <h3 class="text-xl font-bold text-gray-800 mb-1" id="crStModalTitle"></h3>
    <p class="text-gray-400 text-sm mb-5">运营筛选时会看到你的信息，请如实填写</p>
    <div class="space-y-4 mb-6">
      <div>
        <label class="block text-xs font-semibold text-gray-500 mb-1.5">昵称 <span class="text-red-500">*</span></label>
        <input type="text" id="st_name" />
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 mb-1.5">微信号 <span class="text-red-500">*</span></label>
        <input type="text" id="st_wechat" />
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 mb-1.5" id="crStProfileLabel"></label>
        <input type="url" id="st_profile" />
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 mb-1.5" id="crStFansLabel"></label>
        <input type="text" id="st_fans" />
      </div>
    </div>
    <div class="flex gap-3">
      <button class="btn-secondary" onclick="closeModal('streamerModal')">取消</button>
      <button class="btn-primary" onclick="saveStreamer()">进入平台</button>
    </div>
  </div>
</div>

<!-- Blogger Modal -->
<div id="bloggerModal" class="fixed inset-0 modal-backdrop flex items-center justify-center z-50 hidden">
  <div class="bg-white rounded-2xl p-8 w-[420px] shadow-2xl mx-4">
    <div class="text-2xl mb-2" id="crBlModalIcon"></div>
    <h3 class="text-xl font-bold text-gray-800 mb-1" id="crBlModalTitle"></h3>
    <p class="text-gray-400 text-sm mb-5">运营筛选时会看到你的信息，请如实填写</p>
    <div class="space-y-4 mb-6">
      <div>
        <label class="block text-xs font-semibold text-gray-500 mb-1.5">昵称 <span class="text-red-500">*</span></label>
        <input type="text" id="bl_name" />
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 mb-1.5">微信号 <span class="text-red-500">*</span></label>
        <input type="text" id="bl_wechat" />
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 mb-1.5" id="crBlProfileLabel"></label>
        <input type="url" id="bl_profile" />
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 mb-1.5" id="crBlFansLabel"></label>
        <input type="text" id="bl_fans" />
      </div>
    </div>
    <div class="flex gap-3">
      <button class="btn-secondary" onclick="closeModal('bloggerModal')">取消</button>
      <button class="btn-primary" onclick="saveBlogger()">进入平台</button>
    </div>
  </div>
</div>

<script>
// 登录态检测
const _xhsUser = JSON.parse(localStorage.getItem('xhsUser') || '{}');
if (!_xhsUser.loggedIn) { window.location.href = 'login.html'; }

function handleLogout() {
  localStorage.removeItem('xhsUser');
  window.location.href = 'login.html';
}

const C = window.SITE_CONFIG;

// 在 header 显示用户名
const _headerUsername = document.getElementById('headerUsername');
if (_headerUsername) _headerUsername.textContent = _xhsUser.username;

// Apply config to DOM
document.title = C.platformName;
document.getElementById('creatorHeaderName').textContent = C.platformName;
document.getElementById('creatorHeaderSlogan').textContent = C.platformSlogan;
document.getElementById('creatorHeroTitle').textContent = C.heroTitle;
document.getElementById('creatorHeroSubtitle').textContent = C.heroSubtitle;

// Workflow steps
(function() {
  const steps = C.workflowSteps;
  const numsHtml = steps.map((_, i) =>
    `<div class="w-6 h-6 rounded-full bg-pink-100 text-pink-600 text-xs font-bold flex items-center justify-center flex-shrink-0">${i+1}</div>` +
    (i < steps.length - 1 ? '<div class="w-px h-8 bg-gray-100"></div>' : '')
  ).join('');
  const textsHtml = steps.map(s =>
    `<div><p class="font-semibold text-gray-700">${s.title}</p><p class="text-gray-400 text-xs mt-0.5">${s.desc}</p></div>`
  ).join('');
  document.getElementById('workflowStepsContainer').innerHTML =
    `<div class="flex flex-col items-center gap-1">${numsHtml}</div><div class="space-y-5 text-sm">${textsHtml}</div>`;
})();

// Identity cards
document.getElementById('crIdCardAIcon').textContent  = C.creatorTypeA.icon;
document.getElementById('crIdCardALabel').textContent  = '我是' + C.creatorTypeA.label;
document.getElementById('crIdCardADesc').innerHTML     = C.creatorTypeA.shortDesc;
document.getElementById('crIdCardASub').textContent    = '→ 进入' + C.creatorTypeA.label + '端';
document.getElementById('crIdCardASub').className      = 'mt-4 text-xs font-semibold text-' + C.creatorTypeA.color + '-500';
document.getElementById('crIdCardBIcon').textContent   = C.creatorTypeB.icon;
document.getElementById('crIdCardBLabel').textContent  = '我是' + C.creatorTypeB.label;
document.getElementById('crIdCardBDesc').innerHTML     = C.creatorTypeB.shortDesc;
document.getElementById('crIdCardBSub').textContent    = '→ 进入' + C.creatorTypeB.label + '端';
document.getElementById('crIdCardBSub').className      = 'mt-4 text-xs font-semibold text-' + C.creatorTypeB.color + '-500';

// Modals
document.getElementById('crStModalIcon').textContent  = C.creatorTypeA.icon;
document.getElementById('crStModalTitle').textContent  = C.creatorTypeA.label + '信息';
document.getElementById('st_name').placeholder         = C.creatorTypeA.namePlaceholder;
document.getElementById('st_wechat').placeholder       = C.wechatPlaceholder;
document.getElementById('crStProfileLabel').innerHTML  = C.creatorTypeA.profileLabel + ' <span class="text-red-500">*</span>';
document.getElementById('st_profile').placeholder      = C.creatorTypeA.profilePlaceholder;
document.getElementById('crStFansLabel').innerHTML      = C.creatorTypeA.fansLabel + ' <span class="text-red-500">*</span>';
document.getElementById('st_fans').placeholder         = C.creatorTypeA.fansPlaceholder;

document.getElementById('crBlModalIcon').textContent  = C.creatorTypeB.icon;
document.getElementById('crBlModalTitle').textContent  = C.creatorTypeB.label + '信息';
document.getElementById('bl_name').placeholder         = C.creatorTypeB.namePlaceholder;
document.getElementById('bl_wechat').placeholder       = C.wechatPlaceholder;
document.getElementById('crBlProfileLabel').innerHTML  = C.creatorTypeB.profileLabel + ' <span class="text-red-500">*</span>';
document.getElementById('bl_profile').placeholder      = C.creatorTypeB.profilePlaceholder;
document.getElementById('crBlFansLabel').innerHTML      = C.creatorTypeB.fansLabel + ' <span class="text-red-500">*</span>';
document.getElementById('bl_fans').placeholder         = C.creatorTypeB.fansPlaceholder;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2500);
}
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

(function() {
  const name = localStorage.getItem('creatorName');
  const type = localStorage.getItem('creatorType');
  if (!name || !type) return;
  const el = document.getElementById('quickEntry');
  document.getElementById('qeName').textContent = `${name} · ${type}`;
  el.classList.remove('hidden');
})();

function quickGo() {
  const type = localStorage.getItem('creatorType');
  const params = new URLSearchParams(window.location.search);
  const task = params.get('task');
  const dest = type === C.creatorTypeA.label ? C.creatorTypeA.pageName : C.creatorTypeB.pageName;
  window.location.href = task ? `${dest}?task=${task}` : dest;
}

(function autoRedirect() {
  const name = localStorage.getItem('creatorName');
  const type = localStorage.getItem('creatorType');
  if (!name || !type) return;
  const params = new URLSearchParams(window.location.search);
  const task = params.get('task');
  const dest = type === C.creatorTypeA.label ? C.creatorTypeA.pageName : C.creatorTypeB.pageName;
  window.location.replace(task ? `${dest}?task=${task}` : dest);
})();

function choose(role) {
  const params = new URLSearchParams(window.location.search);
  const task = params.get('task');
  if (role === 'streamer') {
    const name = localStorage.getItem('creatorName');
    const type = localStorage.getItem('creatorType');
    if (name && type === C.creatorTypeA.label) { window.location.href = task ? `${C.creatorTypeA.pageName}?task=${task}` : C.creatorTypeA.pageName; return; }
    document.getElementById('st_name').value    = name || '';
    document.getElementById('st_wechat').value  = localStorage.getItem('creatorWechat') || '';
    document.getElementById('st_profile').value = localStorage.getItem('creatorProfile') || '';
    document.getElementById('st_fans').value    = localStorage.getItem('creatorFans') || '';
    document.getElementById('streamerModal').classList.remove('hidden');
  } else {
    const name = localStorage.getItem('creatorName');
    const type = localStorage.getItem('creatorType');
    if (name && type === C.creatorTypeB.label) { window.location.href = task ? `${C.creatorTypeB.pageName}?task=${task}` : C.creatorTypeB.pageName; return; }
    document.getElementById('bl_name').value    = name || '';
    document.getElementById('bl_wechat').value  = localStorage.getItem('creatorWechat') || '';
    document.getElementById('bl_profile').value = localStorage.getItem('creatorProfile') || '';
    document.getElementById('bl_fans').value    = localStorage.getItem('creatorFans') || '';
    document.getElementById('bloggerModal').classList.remove('hidden');
  }
}

function saveStreamer() {
  const name    = document.getElementById('st_name').value.trim();
  const wechat  = document.getElementById('st_wechat').value.trim();
  const profile = document.getElementById('st_profile').value.trim();
  const fans    = document.getElementById('st_fans').value.trim();
  if (!name)    { showToast('请输入昵称'); return; }
  if (!wechat)  { showToast('请填写微信号'); return; }
  if (!profile) { showToast('请填写主页链接'); return; }
  if (!fans)    { showToast('请填写粉丝数'); return; }
  localStorage.setItem('creatorName', name);
  localStorage.setItem('creatorWechat', wechat);
  localStorage.setItem('creatorType', C.creatorTypeA.label);
  localStorage.setItem('creatorProfile', profile);
  localStorage.setItem('creatorFans', fans);
  const params = new URLSearchParams(window.location.search);
  const task = params.get('task');
  window.location.href = task ? `${C.creatorTypeA.pageName}?task=${task}` : C.creatorTypeA.pageName;
}

function saveBlogger() {
  const name    = document.getElementById('bl_name').value.trim();
  const wechat  = document.getElementById('bl_wechat').value.trim();
  const profile = document.getElementById('bl_profile').value.trim();
  const fans    = document.getElementById('bl_fans').value.trim();
  if (!name)    { showToast('请输入昵称'); return; }
  if (!wechat)  { showToast('请填写微信号'); return; }
  if (!profile) { showToast('请填写主页链接'); return; }
  if (!fans)    { showToast('请填写粉丝数'); return; }
  localStorage.setItem('creatorName', name);
  localStorage.setItem('creatorWechat', wechat);
  localStorage.setItem('creatorType', C.creatorTypeB.label);
  localStorage.setItem('creatorProfile', profile);
  localStorage.setItem('creatorFans', fans);
  const params = new URLSearchParams(window.location.search);
  const task = params.get('task');
  window.location.href = task ? `${C.creatorTypeB.pageName}?task=${task}` : C.creatorTypeB.pageName;
}

['streamerModal','bloggerModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => { if(e.target===document.getElementById(id)) closeModal(id); });
});
</script>
</body>
</html>
